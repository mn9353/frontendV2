<div class="glow-bg"></div>
<app-header [profile]="profile()"></app-header>


<main *ngIf="profile()">
  <app-hero appRevealOnScroll [profile]="profile()"></app-hero>
  <app-about appRevealOnScroll [profile]="profile()"></app-about>
  <app-experience appRevealOnScroll></app-experience>
  <app-projects appRevealOnScroll></app-projects>
  <app-skills appRevealOnScroll></app-skills>
  <app-achievements appRevealOnScroll></app-achievements>
  <app-testimonials appRevealOnScroll></app-testimonials>
  <app-contact appRevealOnScroll [profile]="profile()"></app-contact>
</main>

<!-- Premium full-screen error state (profile API failed) -->
<div class="critical-error-screen" *ngIf="!loading() && !profile() && errorMessage()">
  <div class="critical-error-inner">
    <div class="critical-error-icon">
      <i class="ri-code-s-slash-line"></i>
    </div>
    <h2 class="critical-error-title">Somewhere, a semicolon is missing.</h2>
    <p class="critical-error-sub">The backend team (me) is investigating.<br>Sit tight - or come back in a bit.</p>
    <button class="critical-error-btn" (click)="fetchProfile()">
      <i class="ri-refresh-line"></i>
      Try again
    </button>
  </div>
</div>

<app-footer *ngIf="profile()" [profile]="profile()"></app-footer>

<!-- Translation error toast (2s auto-dismiss) -->
<div class="translation-toast" *ngIf="translationService.showTranslationError()">
  <i class="ri-cup-line"></i>
  <div class="translation-toast-text">
    <span class="translation-toast-title">Translation took a coffee break.</span>
    <span class="translation-toast-sub">Showing English for now.</span>
  </div>
</div>

<!-- Cinematic Loader Overlay -->
<div class="cinematic-loader" *ngIf="loading()" [class.hiding]="isHidingLoader()">
  <div class="signature-wrapper">
    <!-- Dynamically swap signature based on theme -->
    <img
      [src]="isDark() ? 'my_sign_white.webp' : 'my_sign_black.webp'"
      [attr.data-fallback]="isDark() ? 'https://nhrwkotrxyczxdpkuney.supabase.co/storage/v1/object/public/portfolio_images/other_photos/my_sign_white.webp' : 'https://nhrwkotrxyczxdpkuney.supabase.co/storage/v1/object/public/portfolio_images/other_photos/my_sign_black.webp'"
      (error)="onSignatureError($event)"
      alt="Loading"
      class="signature-ink" />
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-logo">{{ profile?.shortName || profile?.fullName }}<span class="dot">.</span></div>
    <button class="btn pill back-to-top" (click)="scrollToTop()" aria-label="Back to top" title="Back to top">
      <span>Back to top</span>
      <i class="ri-arrow-up-line"></i>
    </button>
    <p class="footer-copy text-muted">
      &copy; {{ currentYear }} {{ profile?.fullName }}. Built with precision.
    </p>
  </div>
</footer>

<section id="testimonials" class="section" *ngIf="testimonials().length > 0">
  <div class="container">
    <h2 class="section-title">{{ 'Testimonials' | translate }}</h2>
    <div class="testimonials-grid">
      <div class="testimonial-card-wrapper" *ngFor="let t of testimonials(); let i = index">
        <div class="testimonial-card premium-card">
          <div class="testimonial-author">
            <img *ngIf="t.profileImageUrl" [src]="t.profileImageUrl" [alt]="t.clientName" class="author-avatar">
            <div class="author-info" *ngIf="!t.profileImageUrl" class="author-avatar-placeholder">
              {{ t.clientName?.charAt(0) }}
            </div>
            <div class="author-details">
              <span class="author-name">{{ t.clientName | translate }}</span>
              <span class="author-role text-muted">{{ t.role | translate }}, {{ t.companyName | translate }}</span>
            </div>
          </div>
          <div class="quote-icon"><i class="ri-double-quotes-l"></i></div>
          <p class="testimonial-text text-secondary">
            {{ expandedTestimonials()[i] || t.content!.length <= 150 ? (t.content | translate) : ((t.content | translate | slice:0:150) + '...') }}
          </p>
          <button class="view-more-btn" *ngIf="t.content && t.content.length > 150" (click)="toggleTestimonial(i)">
            {{ (expandedTestimonials()[i] ? 'View Less' : 'Read More') | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

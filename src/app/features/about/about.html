<section id="about" class="section">
  <div class="container">
    <div class="about-grid">
      <div class="about-content">
        <h2 class="section-title">{{ 'About Me' | translate }}</h2>
        <div class="about-text" [innerHTML]="profile?.aboutMe | translate"></div>
      </div>
      
      <div class="about-image-wrapper" *ngIf="profile?.profileImageUrl">
        <img [src]="profile?.profileImageUrl" [alt]="profile?.fullName" class="about-image">
      </div>
    </div>
  </div>
</section>

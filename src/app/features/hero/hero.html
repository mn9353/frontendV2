<section class="hero-section">
  <!-- Dynamic Background Glows -->
  <div class="hero-glow glow-1"></div>
  <div class="hero-glow glow-2"></div>

  <div class="container hero-container">
    <div class="hero-content">
      <div class="status-badge-wrapper" *ngIf="profile?.availabilityStatus">
        <div class="status-badge">
          <span class="status-dot"></span>
          <span>{{ profile?.availabilityStatus }}</span>
        </div>
      </div>
      
      <h1 class="hero-title text-gradient" *ngIf="profile">
        {{ profile.fullName | translate }}
      </h1>
      
      <p class="hero-subtitle" *ngIf="profile">
        {{ profile.role | translate }}
      </p>
      
      <div class="hero-actions">
        <a href="#projects" class="btn btn-primary pill">{{'View Projects'|translate}}</a>
        <a *ngIf="profile?.resumeUrl" [href]="formatUrl(profile?.resumeUrl)" target="_blank" download class="btn btn-outline pill">{{'Download Resume'|translate}}</a>
      </div>
    </div>
  </div>

  <div class="scroll-indicator">
    <div class="mouse"></div>
    <span>Scroll</span>
  </div>
</section>
